version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: tiny-trail-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tiny_trail_db
      MYSQL_USER: tinytrail
      MYSQL_PASSWORD: tinytrailpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - tiny-trail-network

  # Spring Boot Backend
  backend:
    build:
      context: ./tiny-trail-backend
      dockerfile: Dockerfile
    container_name: tiny-trail-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=tiny_trail_db
      - DB_USERNAME=tinytrail
      - DB_PASSWORD=tinytrailpass
      - JWT_SECRET=mySecretKey123456789012345678901234567890
      - RAZORPAY_KEY_ID=your_razorpay_key_id
      - RAZORPAY_KEY_SECRET=your_razorpay_key_secret
    ports:
      - "8080:8080"
    networks:
      - tiny-trail-network
    volumes:
      - ./logs:/app/logs

  # React Frontend
  frontend:
    build:
      context: ./tiny-trail-frontend
      dockerfile: Dockerfile
    container_name: tiny-trail-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - tiny-trail-network

volumes:
  mysql_data:

networks:
  tiny-trail-network:
    driver: bridge
