spring:
  application:
    name: tiny-trail-backend
  
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:tiny_trail_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:tinytrail}
    password: ${DB_PASSWORD:tinytrailpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  security:
    jwt:
      secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
      expiration: 86400000 # 24 hours in milliseconds

server:
  port: 8080
  servlet:
    context-path: /api

# CORS Configuration
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://frontend:80}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:your_razorpay_key_id}
  key-secret: ${RAZORPAY_KEY_SECRET:your_razorpay_key_secret}

logging:
  level:
    com.tinytrail: INFO
    org.springframework.security: WARN
  file:
    name: /app/logs/tiny-trail-backend.log
