name: tinytrails_mvp
description: "TinyTrails MVP - Hyperlocal Digital Marketplace with Glass & Whitespace Design"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.2.1

  # Utilities
  http: ^1.3.0
  image_picker: ^1.1.2
  geolocator: ^11.0.0
  geocoding: ^2.1.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  fl_chart: ^0.68.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/Pictures/


