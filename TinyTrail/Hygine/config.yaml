# AI Hygiene Classification Configuration

# Dataset paths
dataset_root: "AI_Hygiene_Model/dataset"
model_output_path: "models/hygiene_model.pth"

# Training hyperparameters
training:
  epochs: 10
  batch_size: 32
  learning_rate: 0.001
  num_workers: 0
  architecture: "resnet18"  # Options: resnet18, efficientnet_b0
  
# Image preprocessing
preprocessing:
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

# Data augmentation
augmentation:
  random_crop_scale: [0.7, 1.0]
  random_flip_prob: 0.5
  rotation_degrees: 15
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05

# Dataset cleaning
cleaning:
  min_image_size: 128
  filter_irrelevant: false  # Use model-based filtering
  topk: 5
  min_relevant_score: 0.08
  review_directory: "_removed_irrelevant"

# Image scraping
scraping:
  images_per_query: 100
  min_image_size: [256, 256]
  parser_threads: 2
  downloader_threads: 4

# Logging
logging:
  level: "INFO"
  log_file: "hygiene_training.log"

# Class names
classes:
  - "meets_standard"
  - "needs_work"
  - "shouldnt_work"
