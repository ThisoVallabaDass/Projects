name: CI

on:
  push:
    branches: [ main, 'feature/*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tinytrail
      SPRING_DATASOURCE_USERNAME: tinytrail
      SPRING_DATASOURCE_PASSWORD: tinytrail

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: tinytrail
          POSTGRES_USER: tinytrail
          POSTGRES_PASSWORD: tinytrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tinytrail -d tinytrail" \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Cache node modules (mobile)
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend deps
        working-directory: mobile
        run: |
          npm ci

      - name: Run frontend tests
        working-directory: mobile
        run: |
          npm test --if-present

      - name: Build & Test Backend
        run: |
          mvn -B -DskipTests=false test

