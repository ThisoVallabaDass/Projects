version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: tinytrail-db
    environment:
      MYSQL_DATABASE: tinytrail
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_USER: tinytrail
      MYSQL_PASSWORD: tinytrail
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./samples/seed-data.sql:/docker-entrypoint-initdb.d/seed-data.sql
    networks:
      - tinytrail-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: tinytrail-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/tinytrail?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: tinytrail
      SPRING_DATASOURCE_PASSWORD: tinytrail
      JWT_SECRET: 'dev-secret-change-me-in-production'
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - tinytrail-network
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  db-data:

networks:
  tinytrail-network:
    driver: bridge
