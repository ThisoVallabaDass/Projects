<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Trail - Web Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        input, select, button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        
        input, select {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        button {
            background: #FF6F00;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #E65100;
        }
        
        .products {
            display: grid;
            gap: 15px;
        }
        
        .product {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #FF6F00;
        }
        
        .product-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .product-price {
            color: #FF6F00;
            font-weight: bold;
        }
        
        .status {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #F44336;
        }
        
        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        
        .hidden {
            display: none;
        }
        
        .login-form, .main-app {
            display: none;
        }
        
        .login-form.active, .main-app.active {
            display: block;
        }
        
        .nav {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        
        .nav button {
            flex: 1;
            margin: 0 5px;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .nav button.active {
            background: #FF6F00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🛒 Tiny Trail</div>
            <div class="subtitle">Local Marketplace Demo</div>
        </div>
        
        <div id="status" class="status hidden"></div>
        
        <!-- Login Form -->
        <div id="loginForm" class="login-form active">
            <div class="card">
                <h2>Login</h2>
                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" id="username" placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" id="password" placeholder="Enter password">
                </div>
                <button onclick="login()">Login</button>
                <p style="margin-top: 15px; text-align: center; opacity: 0.8;">
                    Demo users: admin/password123, john_buyer/password123
                </p>
            </div>
        </div>
        
        <!-- Main App -->
        <div id="mainApp" class="main-app">
            <div class="nav">
                <button class="active" onclick="showTab('search')">Search</button>
                <button onclick="showTab('cart')">Cart</button>
                <button onclick="showTab('orders')">Orders</button>
            </div>
            
            <!-- Search Tab -->
            <div id="searchTab" class="tab">
                <div class="card">
                    <h3>Search Products</h3>
                    <div class="input-group">
                        <label>Pincode:</label>
                        <input type="text" id="pincode" placeholder="Enter pincode (try: 600001)" value="600001">
                    </div>
                    <button onclick="searchProducts()">Search Products</button>
                </div>
                
                <div id="productsList" class="products"></div>
            </div>
            
            <!-- Cart Tab -->
            <div id="cartTab" class="tab hidden">
                <div class="card">
                    <h3>Shopping Cart</h3>
                    <div id="cartItems"></div>
                    <button onclick="checkout()">Checkout</button>
                </div>
            </div>
            
            <!-- Orders Tab -->
            <div id="ordersTab" class="tab hidden">
                <div class="card">
                    <h3>Order History</h3>
                    <div id="ordersList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let cart = [];
        let products = [];
        
        const API_BASE = 'http://localhost:8080';
        
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.classList.remove('hidden');
            
            setTimeout(() => {
                status.classList.add('hidden');
            }, 3000);
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    localStorage.setItem('token', data.token);
                    
                    document.getElementById('loginForm').classList.remove('active');
                    document.getElementById('mainApp').classList.add('active');
                    
                    showStatus('Login successful!', 'success');
                } else {
                    showStatus('Login failed. Check credentials.', 'error');
                }
            } catch (error) {
                showStatus('Backend server not running. Please start it first.', 'error');
            }
        }
        
        async function searchProducts() {
            const pincode = document.getElementById('pincode').value;
            
            try {
                const response = await fetch(`${API_BASE}/products/search?pincode=${pincode}`);
                const data = await response.json();
                
                products = data;
                displayProducts(data);
                showStatus(`Found ${data.length} products`, 'success');
            } catch (error) {
                showStatus('Error searching products. Check if backend is running.', 'error');
            }
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsList');
            
            if (products.length === 0) {
                container.innerHTML = '<div class="card">No products found for this pincode.</div>';
                return;
            }
            
            container.innerHTML = products.map(product => `
                <div class="product">
                    <div class="product-name">${product.name}</div>
                    <div style="margin: 5px 0; opacity: 0.8;">${product.description}</div>
                    <div class="product-price">₹${product.price}</div>
                    <div style="margin-top: 10px;">
                        <button onclick="addToCart(${product.id})" style="width: auto; padding: 8px 16px;">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                cart.push(product);
                showStatus(`${product.name} added to cart!`, 'success');
                updateCartDisplay();
            }
        }
        
        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                container.innerHTML = '<p>Your cart is empty.</p>';
                return;
            }
            
            container.innerHTML = cart.map(product => `
                <div class="product">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">₹${product.price}</div>
                </div>
            `).join('');
        }
        
        async function checkout() {
            if (cart.length === 0) {
                showStatus('Cart is empty!', 'error');
                return;
            }
            
            try {
                const items = cart.map(product => ({
                    productId: product.id,
                    quantity: 1,
                    price: product.price
                }));
                
                const response = await fetch(`${API_BASE}/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        deliveryAddress: '123 Demo Street, Chennai',
                        paymentMethod: 'UPI',
                        upiId: 'demo@upi',
                        items: items
                    })
                });
                
                if (response.ok) {
                    const order = await response.json();
                    showStatus(`Order placed successfully! Order ID: ${order.id}`, 'success');
                    cart = [];
                    updateCartDisplay();
                } else {
                    showStatus('Checkout failed.', 'error');
                }
            } catch (error) {
                showStatus('Error during checkout.', 'error');
            }
        }
        
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.add('hidden'));
            document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.remove('hidden');
            event.target.classList.add('active');
            
            if (tabName === 'cart') {
                updateCartDisplay();
            }
        }
        
        // Auto-search on page load
        window.onload = function() {
            searchProducts();
        };
    </script>
</body>
</html>
