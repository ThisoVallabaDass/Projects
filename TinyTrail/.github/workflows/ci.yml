name: CI

on:
  push:
    branches: [ main, 'feature/*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend deps
        working-directory: model/frontend
        run: |
          npm ci || true
      - name: Run frontend tests (if present)
        working-directory: model/frontend
        run: |
          npm test --silent || true
      - name: Run backend tests
        working-directory: model/backend
        run: |
          ./mvnw -v || true
          ./mvnw test || true
      - name: Lint / build notes
        run: echo "CI completed (note: tests may be placeholders in scaffolding)"
